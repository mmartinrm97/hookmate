# ── Server ──────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000

# ── Project Identification ──────────────────────────────────────
sonar.projectKey=hookmate
sonar.projectName=HookMate
sonar.projectVersion=0.1.0

# ── Source Encoding ─────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Monorepo Source & Test Directories ──────────────────────────
sonar.sources=apps/api/src,apps/dashboard/src,packages/shared/src,infrastructure/bin,infrastructure/lib
sonar.tests=apps/api/src,apps/api/test

# ── Test File Patterns ──────────────────────────────────────────
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**

# ── Exclusions ──────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.config.ts,**/*.config.js,**/*.config.mjs,**/*.d.ts

# ── Coverage Reports (generate first with: pnpm --filter @hookmate/api test:cov) ──
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info

# ── Coverage Exclusions ─────────────────────────────────────────
sonar.coverage.exclusions=**/*.config.ts,**/*.config.js,**/*.config.mjs,**/index.ts,infrastructure/**,apps/dashboard/**
